<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Titan Exchange</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
<h1>👑 Titan Exchange Admin</h1>
</header>

<div class="card">

<h2>Admin Panel</h2>

<label>User ID</label>
<input type="text" id="userid" placeholder="TX10001">

<label>Coins</label>
<input type="number" id="coins" placeholder="1000">

<br><br>

<button class="btn" onclick="addCoins()">➕ Add Coins</button>

<button class="btn" onclick="removeCoins()">➖ Remove Coins</button>

</div>

<div class="card">
<h2>User Balance</h2>

<h1 id="balance">1000 Coins</h1>

</div>

<script>

let balance = 1000;

function addCoins(){

let amount = Number(document.getElementById("coins").value);

balance += amount;

document.getElementById("balance").innerHTML = balance + " Coins";

}

function removeCoins(){

let amount = Number(document.getElementById("coins").value);

balance -= amount;

if(balance<0) balance=0;

document.getElementById("balance").innerHTML = balance + " Coins";

}

</script>

</body>
</html>
