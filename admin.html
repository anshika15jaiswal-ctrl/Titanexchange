<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Titan Exchange Admin</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
<h1>👑 Titan Exchange Admin</h1>
</header>

<div class="card">

<h2>Admin Panel</h2>

<label>User ID</label><br>
<input type="text" id="userid" placeholder="TX10001"><br><br>

<label>Coins</label><br>
<input type="number" id="coins" placeholder="1000"><br><br>

<button class="btn" onclick="addCoins()">➕ Add Coins</button>

<button class="btn" onclick="removeCoins()">➖ Remove Coins</button>

</div>

<div class="card">
<h2>User Balance</h2>

<h1 id="balance">1000 Coins</h1>

</div>

<script src="admin.js"></script>

</body>
</html>
