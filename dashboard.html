<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Titan Exchange</title>

<link rel="stylesheet" href="style.css">
<script src="Live.js" defer></script>

</head>

<body>

<header class="header">

<h1>🏏 Titan Exchange</h1>

<nav>
<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
<a href="login.html">Logout</a>
</nav>

</header>

<section class="card">

<h2>💰 Wallet</h2>

<h1 id="coins">1000</h1>

<p>Demo Coins</p>

</section>

<section class="card">

<h2>👤 User Profile</h2>

<p><b>Name :</b> <span id="name"></span></p>

<p><b>User ID :</b> <span id="userid"></span></p>

<p><b>Phone :</b> <span id="phone"></span></p>

<p><b>Status :</b> 🟢 Active</p>

</section>

<section class="card">

<h2>🏏 Live Cricket Matches</h2>

<div id="liveMatches">

Loading Live Matches...

</div>

</section>

<section class="card">

<h2>📜 Recent Activity</h2>

<ul>

<li>✅ Account Created</li>

<li>💰 1000 Demo Coins Added</li>

<li>🏏 Ready To Play</li>

</ul>

</section>

<footer>

<p>© 2026 Titan Exchange</p>

</footer>

<script>

let user = JSON.parse(localStorage.getItem("user"));

if(user){

document.getElementById("name").innerHTML = user.name;

document.getElementById("userid").innerHTML = user.userId;

document.getElementById("phone").innerHTML = user.phone;

document.getElementById("coins").innerHTML = user.coins;

}else{

window.location = "login.html";

}

</script>

</body>
</html>
