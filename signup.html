<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Titan Exchange</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
<h1>🏏 Titan Exchange</h1>
</header>

<div class="card">

<h2>Create Account</h2>

<input type="text" id="name" placeholder="Full Name"><br><br>

<input type="text" id="phone" placeholder="Phone Number"><br><br>

<input type="password" id="password" placeholder="Password"><br><br>

<button class="btn" onclick="signup()">
Create Account
</button>

<p style="margin-top:20px;">
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

<script>

function signup(){

const userId = "TX" + Math.floor(10000 + Math.random() * 90000);

let user = {

userId: userId,

name: document.getElementById("name").value,

phone: document.getElementById("phone").value,

password: document.getElementById("password").value,

coins: 1000

};

localStorage.setItem("user", JSON.stringify(user));

alert("Account Created!\n\nYour User ID: " + userId);

window.location = "login.html";

}

</script>

</body>
</html>
